<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <title>Validação concluída — Progresso disponível</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <style>
    :root{
      --bg1:#fff1f5;
      --bg2:#fdf2f8;
      --bg3:#ecfeff;
      --card:#ffffffd9;
      --stroke:#ffffff80;
      --text:#0f172a;
      --muted:#64748b;
      --pink:#ff2d75;
      --pink2:#ff4d8d;
      --cyan:#00d9ff;
      --green:#16a34a;
      --soft:#f8fafc;
      --line:#e2e8f0;
      --shadow:0 20px 60px rgba(15,23,42,.12);
      --radius:24px;
    }

    *{
      margin:0;
      padding:0;
      box-sizing:border-box;
      -webkit-tap-highlight-color:transparent;
    }

    html,body{
      width:100%;
      min-height:100%;
      font-family:system-ui,-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;
      color:var(--text);
      background:
        radial-gradient(circle at 20% 20%, rgba(255,45,117,.14), transparent 28%),
        radial-gradient(circle at 80% 15%, rgba(0,217,255,.14), transparent 28%),
        radial-gradient(circle at 50% 100%, rgba(255,105,180,.10), transparent 36%),
        linear-gradient(135deg,var(--bg1),var(--bg2),var(--bg3));
      background-size: 100% 100%;
      overflow-x:hidden;
    }

    body{
      position:relative;
      display:flex;
      justify-content:center;
      align-items:center;
      padding:18px;
    }

    #particles{
      position:fixed;
      inset:0;
      width:100%;
      height:100%;
      z-index:0;
      pointer-events:none;
    }

    .wrap{
      width:100%;
      max-width:480px;
      position:relative;
      z-index:2;
    }

    .card{
      position:relative;
      overflow:hidden;
      border-radius:var(--radius);
      background:var(--card);
      backdrop-filter: blur(18px);
      -webkit-backdrop-filter: blur(18px);
      border:1px solid var(--stroke);
      box-shadow:var(--shadow);
      padding:18px;
      animation:enter .45s ease;
    }

    @keyframes enter{
      from{opacity:0;transform:translateY(24px) scale(.98)}
      to{opacity:1;transform:translateY(0) scale(1)}
    }

    .shine{
      position:absolute;
      inset:-120px auto auto -80px;
      width:220px;
      height:220px;
      border-radius:50%;
      background:radial-gradient(circle, rgba(255,255,255,.8), rgba(255,255,255,0));
      opacity:.65;
      pointer-events:none;
    }

    .top-badge{
      display:inline-flex;
      align-items:center;
      gap:8px;
      background:#ffffff;
      border:1px solid #f1f5f9;
      color:#0f172a;
      border-radius:999px;
      padding:9px 12px;
      font-size:12px;
      font-weight:700;
      box-shadow:0 8px 24px rgba(15,23,42,.05);
      margin-bottom:14px;
    }

    .dot{
      width:8px;
      height:8px;
      border-radius:50%;
      background:var(--green);
      box-shadow:0 0 0 0 rgba(22,163,74,.55);
      animation:pulse 1.8s infinite;
    }

    @keyframes pulse{
      0%{box-shadow:0 0 0 0 rgba(22,163,74,.45)}
      70%{box-shadow:0 0 0 10px rgba(22,163,74,0)}
      100%{box-shadow:0 0 0 0 rgba(22,163,74,0)}
    }

    h1{
      font-size:28px;
      line-height:1.15;
      letter-spacing:-0.03em;
      margin-bottom:10px;
      font-weight:800;
    }

    h1 span{
      color:var(--pink);
    }

    .subtitle{
      color:var(--muted);
      font-size:14px;
      line-height:1.5;
      margin-bottom:18px;
    }

    .hero-box{
      display:grid;
      grid-template-columns:1fr auto;
      gap:12px;
      align-items:center;
      background:linear-gradient(135deg,#111827,#1e293b);
      color:#fff;
      border-radius:20px;
      padding:14px;
      margin-bottom:16px;
      position:relative;
      overflow:hidden;
